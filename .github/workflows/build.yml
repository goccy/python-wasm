name: build

# End-to-end CI for python-wasm. Runs the wasmify pipeline against the upstream
# `cpython/` submodule from a clean checkout, produces `python.wasm` (the
# wasi-sdk-built CPython interpreter), uploads it as an artifact, and attaches
# an SLSA build-provenance attestation. On a version tag it also publishes the
# wasm as a GitHub Release asset.
#
# The toolchain (wasi-sdk, the wasmify CLI itself, and the build dependencies
# listed in scripts/arch.json) lives inside the wasmify base image, so the
# build runs entirely in a container instead of installing tools on the runner.
#
# On top of that base image this workflow maintains a project-specific cache
# image (ghcr.io/<owner>/python-wasm-cache) keyed on the wasmify image tag and
# the cpython submodule SHA. A successful cold build's container is `docker
# commit`ed as the cache image; its layer carries the populated .wasmify build
# cache (compiled .o/.a + cache.json) so a warm run finishes incrementally
# instead of rebuilding CPython from scratch. The wasmify tag is part of the
# key so a wasmify upgrade forces a genuine cold rebuild rather than reusing a
# snapshot produced by the previous version. Only `push` events publish the
# cache image; `pull_request` runs may read it but never write.
#
# The image is run via `docker run` rather than the GHA `container:` directive
# so a free-disk-space step can run on the host before the container starts —
# the wasi-sdk toolchain plus a full CPython build do not fit in the ~14 GB the
# runner ships with.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write          # release asset upload on tags
  packages: write          # cache image push to ghcr
  id-token: write          # actions/attest-build-provenance OIDC token
  attestations: write

env:
  # Pinned to a released wasmify image. Bump in lock-step with the toolchain;
  # the cache image inherits this base layer via `docker commit`, and the tag
  # is baked into the cache key so an upgrade rolls forward cleanly.
  WASMIFY_IMAGE: ghcr.io/goccy/wasmify:v0.4.2
  CACHE_IMAGE: ghcr.io/${{ github.repository_owner }}/python-wasm-cache

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space on the runner
        # ubuntu-latest ships ~14 GB free on `/`; the image pull plus a full
        # CPython wasm build blow past that. Reclaiming the preinstalled
        # Android SDK / .NET / Haskell trees gets us comfortably clear.
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve cache image tag from wasmify version + cpython submodule SHA
        id: cache_key
        run: |
          submodule_sha=$(git -C cpython rev-parse HEAD)
          # Keep only the wasmify image tag (e.g. v0.4.2); fall back defensively.
          wasmify_tag="${WASMIFY_IMAGE##*:}"
          if [ -z "$wasmify_tag" ] || [ "$wasmify_tag" = "$WASMIFY_IMAGE" ]; then
            wasmify_tag="untagged"
          fi
          echo "tag=${CACHE_IMAGE}:${wasmify_tag}-${submodule_sha}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Try to pull cache image
        # `docker pull` exits non-zero on a missing tag; a miss is not a
        # failure, downstream steps branch on the recorded `hit` flag.
        id: cache_pull
        continue-on-error: true
        run: |
          if docker pull "${{ steps.cache_key.outputs.tag }}"; then
            echo "hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore build cache from cache image (warm path)
        # Cache hit: the cold build's .wasmify cache and CPython cross-build
        # live at /cache/output in the cache image. Copy them back so wasmify's
        # incremental detection can short-circuit unchanged work. `docker
        # create` + `docker cp` is cheaper than starting a container.
        if: steps.cache_pull.outputs.hit == 'true'
        run: |
          container=$(docker create "${{ steps.cache_key.outputs.tag }}")
          docker cp "${container}:/cache/output/." "$PWD/"
          docker rm -f "${container}"
          ls -la .wasmify cpython/cross-build 2>/dev/null | head -10 || true

      - name: Resolve build base image
        # Cache hit -> use the cache image (warm .wasmify). Miss -> the wasmify
        # toolchain image (pulled explicitly so the cost is its own log step).
        id: base
        run: |
          if [ "${{ steps.cache_pull.outputs.hit }}" = "true" ]; then
            echo "image=${{ steps.cache_key.outputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            docker pull "$WASMIFY_IMAGE"
            echo "image=$WASMIFY_IMAGE" >> "$GITHUB_OUTPUT"
          fi

      - name: Build python.wasm
        # Runs the full wasmify pipeline end-to-end, regenerating every derived
        # artefact (build.json, api-spec.json, proto/, bridge/) from source — so
        # none of them are committed. On a cache hit the cpython cross-build and
        # the .wasmify cache are warm, so each phase finishes incrementally; on
        # a miss they run cold (a full CPython wasi build).
        #
        # Detached with `sleep infinity` so the post-build container can be
        # `docker commit`ed (cache miss only). The workspace is bind-mounted so
        # the produced wasm lands on the host for upload/release.
        run: |
          docker run -d --name wasmify-build \
            -v "$PWD:/work" -w /work \
            -e WASMIFY_NON_INTERACTIVE=1 \
            --entrypoint sleep \
            "${{ steps.base.outputs.image }}" infinity
          docker exec wasmify-build bash -ceuxo pipefail '
            # The CPython wasi build runs the target python under wasmtime
            # (module freezing). wasmify ensure-tools installs wasmtime
            # from releases/latest, which 404s when the newest tag has no
            # matching asset yet. Pre-install a pinned wasmtime so ensure-tools
            # detects it (detect_cmd: command -v wasmtime) and skips that step.
            if ! command -v wasmtime >/dev/null 2>&1; then
              v=v45.0.2
              curl -fsSL "https://github.com/bytecodealliance/wasmtime/releases/download/${v}/wasmtime-${v}-x86_64-linux.tar.xz" -o /tmp/wt.tar.xz
              tar -xf /tmp/wt.tar.xz -C /tmp
              install -m 0755 "/tmp/wasmtime-${v}-x86_64-linux/wasmtime" /usr/local/bin/wasmtime
            fi
            wasmtime --version
            make tools
            # `wasmify build` runs only the build command (make -C cross-build);
            # the configure command (scripts/wasi-configure.sh) is separate and
            # must run first — it builds the host python and creates the
            # cross-build/wasm32-wasip1 tree. It needs WASI_SDK_PATH, which
            # ensure-tools keeps at the shared XDG path.
            export WASI_SDK_PATH="${HOME:-/root}/.config/wasmify/bin/wasi-sdk"
            bash scripts/wasi-configure.sh
            wasmify build --non-interactive
            wasmify generate-build
            wasmify parse-headers
            wasmify gen-proto
            wasmify wasm-build --with-bridge --optimize --non-interactive
          '

      - name: Commit and push cache image
        # Cache miss + push events only. PR runs read the cache but never write,
        # so a PR cannot poison the registry. The bind-mount means /work writes
        # are not in the committable layer, so copy the .wasmify cache into a
        # non-mounted path before committing.
        id: cache_push
        if: |
          steps.cache_pull.outputs.hit != 'true' &&
          github.event_name == 'push'
        run: |
          # Snapshot the heavy, regenerable build state: the wasm-build cache
          # (.wasmify) and the CPython wasi cross-build (object files). Both sit
          # under the /work bind-mount, so copy them into a non-mounted path
          # before committing the container.
          docker exec wasmify-build mkdir -p /cache/output/cpython
          docker cp .wasmify "wasmify-build:/cache/output/"
          if [ -d cpython/cross-build ]; then
            docker cp cpython/cross-build "wasmify-build:/cache/output/cpython/"
          fi
          docker commit wasmify-build "${{ steps.cache_key.outputs.tag }}"
          docker tag "${{ steps.cache_key.outputs.tag }}" "${CACHE_IMAGE}:latest"
          push_out=$(docker push "${{ steps.cache_key.outputs.tag }}" | tee /dev/stderr)
          digest=$(printf '%s\n' "$push_out" | grep -oE 'sha256:[a-f0-9]{64}' | head -n1)
          if [ -z "$digest" ]; then
            echo "::error::could not extract digest from docker push output" >&2
            exit 1
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          docker push "${CACHE_IMAGE}:latest"

      - name: Attest cache image build provenance
        # Skipped on cache hits (nothing pushed), on PR runs (no push
        # permission), and on private repos (the attestations API rejects
        # those); re-enables automatically once the repo is public.
        if: |
          steps.cache_pull.outputs.hit != 'true' &&
          github.event_name == 'push' &&
          github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.CACHE_IMAGE }}
          subject-digest: ${{ steps.cache_push.outputs.digest }}
          push-to-registry: true

      - name: Stop build container
        if: always()
        run: docker rm -f wasmify-build 2>/dev/null || true

      - name: Stage release artifact
        # `make wasm` writes the optimized binary under the wasmify output dir;
        # copy it to a stable path for upload / release.
        run: |
          mkdir -p release
          cp .wasmify/wasm-build/output/python.wasm release/python.wasm

      - uses: actions/upload-artifact@v4
        with:
          name: python-wasm-${{ github.sha }}
          path: release/python.wasm
          if-no-files-found: error

      - uses: actions/attest-build-provenance@v2
        # Provenance only on `push` events and only when the repo is public —
        # the attestations API rejects writes from private repos.
        if: github.event_name == 'push' && github.event.repository.visibility == 'public'
        with:
          subject-path: release/python.wasm

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-wasm-${{ github.sha }}
          path: release
      - uses: softprops/action-gh-release@v2
        with:
          files: release/python.wasm
