name: release

# Release CI for python-wasm. Triggered only by a `v*` tag, it runs the exact
# same wasmify pipeline as build.yml (so the released artifacts are rebuilt from
# the tagged source, not promoted from an unverified earlier run), stages the
# four release assets, attaches SLSA build-provenance attestations, and creates
# the GitHub Release.
#
# Assets (mirrors googlesql-wasm's asset set, adapted for python-wasm):
#   * python.wasm            — raw wasi-sdk artifact (binaryen-optimised).
#   * python_wasm2go.go      — protoc-gen-wasmify-go's wasm2go bridge.
#   * python_wasm2go.tar.gz  — the build/wasm2go/internal/wasm2go bundle, a
#                              self-contained Go module after bundle-gomod, which
#                              go-python downloads and extracts.
#   * python_wasm2go.sha256  — sha256sum manifest of the tarball contents;
#                              doubles as the attestation subject-checksums so
#                              any extracted file verifies individually.
#
# Releasing lives ONLY here, never in build.yml — so pull requests and main
# pushes build and verify but never publish. No `tags:` trigger in build.yml
# means a tag push runs this workflow alone (no double build, no race).
#
# Toolchain (wasi-sdk, binaryen, buf, the wasmify CLI) lives inside the wasmify
# base image, so the build runs entirely in a container; the project-specific
# cache image (pushed by build.yml on main) is read for warmth when present.
# `docker run` (not the GHA `container:` directive) so a free-disk-space step
# can run on the host before the container starts.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write          # create the GitHub Release + upload assets
  packages: read           # read the cache image from ghcr (never pushed here)
  id-token: write          # actions/attest-build-provenance OIDC token
  attestations: write

env:
  # Keep in lock-step with build.yml.
  WASMIFY_IMAGE: ghcr.io/goccy/wasmify:v0.4.4
  CACHE_IMAGE: ghcr.io/${{ github.repository_owner }}/python-wasm-cache

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space on the runner
        # ubuntu-latest ships ~14 GB free on `/`; the image pull plus a full
        # CPython wasm build blow past that.
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve cache image tag from wasmify version + cpython submodule SHA
        id: cache_key
        run: |
          submodule_sha=$(git -C cpython rev-parse HEAD)
          wasmify_tag="${WASMIFY_IMAGE##*:}"
          if [ -z "$wasmify_tag" ] || [ "$wasmify_tag" = "$WASMIFY_IMAGE" ]; then
            wasmify_tag="untagged"
          fi
          echo "tag=${CACHE_IMAGE}:${wasmify_tag}-${submodule_sha}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Try to pull cache image
        # A warm cache (built by build.yml on the same cpython SHA) lets the
        # CPython cross-build + .wasmify object cache short-circuit. A miss is
        # not a failure — release.yml never writes the cache, it only reads it.
        id: cache_pull
        continue-on-error: true
        run: |
          if docker pull "${{ steps.cache_key.outputs.tag }}"; then
            echo "hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore generated files from cache image (warm path)
        if: steps.cache_pull.outputs.hit == 'true'
        run: |
          container=$(docker create "${{ steps.cache_key.outputs.tag }}")
          docker cp "${container}:/cache/output/." "$PWD/"
          docker rm -f "${container}"
          ls -la .wasmify cpython/cross-build 2>/dev/null | head -10 || true

      - name: Resolve build base image
        id: base
        run: |
          if [ "${{ steps.cache_pull.outputs.hit }}" = "true" ]; then
            echo "image=${{ steps.cache_key.outputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            docker pull "$WASMIFY_IMAGE"
            echo "image=$WASMIFY_IMAGE" >> "$GITHUB_OUTPUT"
          fi

      - name: Run wasmify pipeline
        # Identical to build.yml's pipeline — the released artifacts are rebuilt
        # from the tagged source. `buf generate --timeout 30m` overrides buf's
        # 2-minute plugin timeout (the wasm2go flavour SSA-lowers a large wasm).
        run: |
          docker run -d --name wasmify-build \
            -v "$PWD:/work" -w /work \
            -e WASMIFY_NON_INTERACTIVE=1 \
            --entrypoint sleep \
            "${{ steps.base.outputs.image }}" infinity
          docker exec wasmify-build bash -ceuxo pipefail '
            export WASMIFY_NO_EMSCRIPTEN_DEFINE=1 WASMIFY_NO_POSIX_COMPAT=1
            make tools
            bash scripts/wasi-configure.sh
            wasmify build --non-interactive
            wasmify generate-build
            wasmify parse-headers --header py.h
            wasmify gen-proto
            wasmify wasm-build --with-bridge --optimize --non-interactive
            # Clean tree before buf generate: protoc-gen-wasmify-go overwrites
            # but never deletes, and the bundle file SET depends on the wasm size
            # (single- vs multi-package layout).
            rm -rf build
            buf generate --timeout 30m
            make bundle-gomod
          '

      - name: Stop build container
        if: always()
        run: docker rm -f wasmify-build 2>/dev/null || true

      - name: Stage release artifacts
        run: |
          mkdir -p release
          cp .wasmify/wasm-build/output/python.wasm release/python.wasm
          cp build/wasm2go/python.go release/python_wasm2go.go
          tar -czf release/python_wasm2go.tar.gz -C build/wasm2go/internal/wasm2go .
          ( cd build/wasm2go/internal/wasm2go && find . -type f -print0 | sort -z \
              | xargs -0 sha256sum ) > release/python_wasm2go.sha256

      - uses: actions/attest-build-provenance@v2
        # Provenance for the wasm + the wasm2go bridge. Skipped on user-owned
        # private repos (the attestations API rejects those); re-enables itself
        # when the repo is public.
        if: github.event.repository.visibility == 'public'
        with:
          subject-path: |
            release/python.wasm
            release/python_wasm2go.go

      - uses: actions/attest-build-provenance@v2
        # wasm2go bundle: one attestation whose subjects are the per-file digests
        # in the manifest, so any file extracted from the tarball verifies
        # individually.
        if: github.event.repository.visibility == 'public'
        with:
          subject-checksums: release/python_wasm2go.sha256

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/python.wasm
            release/python_wasm2go.go
            release/python_wasm2go.tar.gz
            release/python_wasm2go.sha256
